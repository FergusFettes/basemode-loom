site_name: basemode-loom
site_description: Persistent branching exploration for LLM continuations
repo_url: https://github.com/FergusFettes/basemode-loom
repo_name: basemode-loom
site_url: https://fergusfettes.github.io/basemode-loom/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

plugins:
  - search
  - roamlinks

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Agent Quickstart: Agent Quickstart.md
  - Getting Started:
    - Installation: getting-started/Installation.md
    - Quickstart: getting-started/Quickstart.md
  - Concepts:
    - How It Works: concepts/How It Works.md
    - Tree Structure: concepts/Tree Structure.md
  - Usage:
    - CLI Reference: usage/CLI Reference.md
    - TUI Guide: usage/TUI Guide.md
    - Python API: usage/Python API.md
    - Web Server: usage/Web Server.md
  - Reference:
    - GenerationStore: reference/GenerationStore.md
    - Node: reference/Node.md
    - LoomSession: reference/LoomSession.md
    - Display: reference/Display.md
  - basemode:
    - Overview: basemode/basemode Overview.md
    - Getting Started:
      - Installation: basemode/basemode Installation.md
      - Quickstart: basemode/basemode Quickstart.md
    - Concepts:
      - Strategies: basemode/basemode Strategies.md
      - Model Normalization: basemode/basemode Model Normalization.md
    - Usage:
      - CLI Reference: basemode/basemode CLI Reference.md
      - Python API: basemode/basemode Python API.md
    - Reference:
      - continue_text: basemode/continue_text.md
      - branch_text: basemode/branch_text.md
      - GenerationParams: basemode/GenerationParams.md
      - ContinuationStrategy: basemode/ContinuationStrategy.md
