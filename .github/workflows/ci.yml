name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: make lint-core

      - name: Test
        run: make test-core

      - name: Build docs
        run: uv run mkdocs build --strict
